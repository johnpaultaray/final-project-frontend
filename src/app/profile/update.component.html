<div class="account-glass">
    <h4 class="card-title">Update Profile</h4>
    <p class="card-subtitle">Edit your personal information below</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row g-3 mb-3">
            <div class="col-4">
                <label class="form-label">Title</label>
                <select formControlName="title" class="form-control"
                        [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
                    <option value="">Select</option>
                    <option value="Mr">Mr</option>
                    <option value="Mrs">Mrs</option>
                    <option value="Miss">Miss</option>
                    <option value="Ms">Ms</option>
                </select>
                <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
                    <div *ngIf="f['title'].errors['required']">Required</div>
                </div>
            </div>
            <div class="col-4">
                <label class="form-label">First Name</label>
                <input type="text" formControlName="firstName" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }" />
                <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">
                    <div *ngIf="f['firstName'].errors['required']">Required</div>
                </div>
            </div>
            <div class="col-4">
                <label class="form-label">Last Name</label>
                <input type="text" formControlName="lastName" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }" />
                <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">
                    <div *ngIf="f['lastName'].errors['required']">Required</div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="text" formControlName="email" class="form-control"
                   [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
            <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                <div *ngIf="f['email'].errors['required']">Email is required</div>
                <div *ngIf="f['email'].errors['email']">Email is invalid</div>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label">Password <span class="text-muted" style="font-size: 0.75rem;">(leave blank to keep)</span></label>
                <input type="password" formControlName="password" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
                       placeholder="••••••••" />
                <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                    <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
                </div>
            </div>
            <div class="col-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" formControlName="confirmPassword" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
                       placeholder="••••••••" />
                <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                    <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords don't match</div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4 mt-4">
            <button [disabled]="loading" class="btn btn-primary btn-lg flex-grow-1 fw-semibold">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Save Changes
            </button>
            <a routerLink="/profile" class="btn btn-outline-light btn-lg" style="border-color: rgba(255,255,255,0.15);">Cancel</a>
        </div>
    </form>

    <div class="divider"></div>

    <h6 class="text-danger fw-semibold mb-2">Danger Zone</h6>
    <p class="text-muted mb-3" style="font-size: 0.85rem;">Deleting your account is permanent and cannot be undone.</p>
    <button [disabled]="deleting" class="btn btn-outline-danger btn-delete-account" (click)="onDelete()">
        <span *ngIf="deleting" class="spinner-border spinner-border-sm me-1"></span>
        Delete My Account
    </button>
</div>
