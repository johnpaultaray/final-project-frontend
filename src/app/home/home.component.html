<div class="p-4">
    <div class="container">
        <h1>Hi {{account?.firstName}}!</h1>
        <p>You're logged in with Angular 21 JWT Authentication & Authorization</p>
        <p class="mb-3">From home component you can:</p>
        <ul>
            <li><a routerLink="/profile">View / Update Profile</a></li>
            <li *ngIf="account?.role === 'Admin'"><a routerLink="/admin">Go to Admin Section</a></li>
        </ul>
    </div>
</div>
