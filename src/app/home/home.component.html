<div class="p-4 d-flex justify-content-center">
    <div class="glass-panel p-5 text-center" style="max-width: 600px; width: 100%;">
        <div class="mb-4">
            <h1 class="display-5 fw-bold mb-2">Welcome, {{account?.firstName || 'User'}}!</h1>
            <span class="badge" [ngClass]="account?.role === 'Admin' ? 'bg-danger' : 'bg-primary'" style="font-size: 1rem; padding: 6px 12px; border-radius: 20px;">
                Role: {{account?.role || 'Unknown'}}
            </span>
        </div>
        
        <p class="text-muted fs-5 mb-5">
            You're logged in with Angular 21 JWT Authentication & Authorization. 
            Experience the new premium dark mode.
        </p>

        <div class="d-flex flex-column gap-3">
            <a routerLink="/profile" class="btn btn-primary btn-lg w-100">
                View / Update Profile
            </a>
            <a *ngIf="account?.role === 'Admin'" routerLink="/admin" class="btn btn-outline-light btn-lg w-100" style="border-color: rgba(255,255,255,0.2);">
                Go to Admin Section
            </a>
        </div>
    </div>
</div>
