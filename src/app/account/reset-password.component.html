<div class="account-glass">
    <h4 class="card-title">Reset Password</h4>
    <p class="card-subtitle">Choose a new password for your account</p>

    <!-- Validating State -->
    <div *ngIf="tokenStatus === TokenStatus.Validating" class="text-center py-4">
        <div class="status-icon verifying mx-auto">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
        <p class="text-muted mt-2 mb-0">Validating your token...</p>
    </div>

    <!-- Invalid Token State -->
    <div *ngIf="tokenStatus === TokenStatus.Invalid" class="text-center py-4">
        <div class="status-icon error mx-auto">⚠️</div>
        <p class="text-danger fw-semibold mb-2">Token validation failed</p>
        <p class="text-muted mb-0" style="font-size: 0.875rem;">
            Your token may have expired. Get a new one from the
            <a routerLink="/account/forgot-password" class="text-primary text-decoration-none fw-semibold">forgot password</a> page.
        </p>
    </div>

    <!-- Valid Token — Show Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="tokenStatus === TokenStatus.Valid">
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" formControlName="password" class="form-control"
                   [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
                   placeholder="••••••••" />
            <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                <div *ngIf="f['password'].errors['required']">Password is required</div>
                <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" formControlName="confirmPassword" class="form-control"
                   [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
                   placeholder="••••••••" />
            <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                <div *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</div>
                <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords don't match</div>
            </div>
        </div>

        <div class="d-flex flex-column gap-3 mb-4">
            <button [disabled]="loading" class="btn btn-primary btn-lg w-100 fw-semibold">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Reset Password
            </button>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            <a routerLink="/account/login" class="text-primary text-decoration-none fw-semibold">Back to login</a>
        </p>
    </form>
</div>
