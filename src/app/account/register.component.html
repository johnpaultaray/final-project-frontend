<div class="account-glass">
    <h4 class="card-title">Create an Account</h4>
    <p class="card-subtitle">Fill in your details to get started</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row g-3 mb-3">
            <div class="col-4">
                <label class="form-label">Title</label>
                <select formControlName="title" class="form-control"
                        [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
                    <option value="">Select</option>
                    <option value="Mr">Mr</option>
                    <option value="Mrs">Mrs</option>
                    <option value="Miss">Miss</option>
                    <option value="Ms">Ms</option>
                </select>
                <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
                    <div *ngIf="f['title'].errors['required']">Required</div>
                </div>
            </div>
            <div class="col-4">
                <label class="form-label">First Name</label>
                <input type="text" formControlName="firstName" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['firstName'].errors }"
                       placeholder="John" />
                <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback">
                    <div *ngIf="f['firstName'].errors['required']">Required</div>
                </div>
            </div>
            <div class="col-4">
                <label class="form-label">Last Name</label>
                <input type="text" formControlName="lastName" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['lastName'].errors }"
                       placeholder="Doe" />
                <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback">
                    <div *ngIf="f['lastName'].errors['required']">Required</div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="text" formControlName="email" class="form-control"
                   [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
                   placeholder="you@example.com" />
            <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                <div *ngIf="f['email'].errors['required']">Email is required</div>
                <div *ngIf="f['email'].errors['email']">Email is invalid</div>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label">Password</label>
                <input type="password" formControlName="password" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
                       placeholder="••••••••" />
                <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                    <div *ngIf="f['password'].errors['required']">Required</div>
                    <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
                </div>
            </div>
            <div class="col-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" formControlName="confirmPassword" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }"
                       placeholder="••••••••" />
                <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                    <div *ngIf="f['confirmPassword'].errors['required']">Required</div>
                    <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords don't match</div>
                </div>
            </div>
        </div>

        <div class="mb-4 form-check">
            <input type="checkbox" formControlName="acceptTerms" class="form-check-input"
                   [ngClass]="{ 'is-invalid': submitted && f['acceptTerms'].errors }" id="acceptTerms" />
            <label for="acceptTerms" class="form-check-label">I accept the Terms &amp; Conditions</label>
            <div *ngIf="submitted && f['acceptTerms'].errors" class="invalid-feedback">
                <div>You must accept the Terms to continue</div>
            </div>
        </div>

        <div class="mb-4">
            <button [disabled]="loading" class="btn btn-primary btn-lg w-100 fw-semibold">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Create Account
            </button>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            Already have an account?
            <a routerLink="/account/login" class="text-primary text-decoration-none fw-semibold">Sign in</a>
        </p>
    </form>
</div>
