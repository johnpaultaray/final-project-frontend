<div class="account-glass">

    <!-- SUCCESS SCREEN: shown after email is sent -->
    <ng-container *ngIf="emailSent">
        <div class="text-center py-2">
            <div class="status-icon success mx-auto mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.5" style="color: #63c78c;">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25H4.5A2.25 2.25 0 012.25 17.25V6.75M21.75 6.75L12 13.5 2.25 6.75M21.75 6.75A2.25 2.25 0 0019.5 4.5H4.5A2.25 2.25 0 002.25 6.75" />
                </svg>
            </div>
            <h4 class="card-title">Check your inbox</h4>
            <p class="card-subtitle mb-1">Password reset instructions have been sent to:</p>
            <p class="fw-semibold mb-4" style="color: #8b7ff0;">{{ sentToEmail }}</p>
            <p class="footer-text">
                Didn't receive it?
                <a href="javascript:void(0)" (click)="emailSent = false; submitted = false"
                    class="text-primary text-decoration-none fw-semibold">Try again</a>
            </p>
        </div>
    </ng-container>

    <!-- FORGOT PASSWORD FORM: shown before submission -->
    <ng-container *ngIf="!emailSent">
        <p class="card-subtitle">Enter your email and we'll send you reset instructions</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="text" formControlName="email" class="form-control"
                    [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" placeholder="you@example.com" />
                <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                    <div *ngIf="f['email'].errors['required']">Email is required</div>
                    <div *ngIf="f['email'].errors['email']">Email is invalid</div>
                </div>
            </div>

            <div class="d-flex flex-column gap-3 mb-4">
                <button [disabled]="loading" class="btn btn-primary btn-lg w-100 fw-semibold">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                    Send Reset Link
                </button>
            </div>

            <div class="divider"></div>

            <p class="footer-text">
                Remember your password?
                <a routerLink="account/login" class="text-primary text-decoration-none fw-semibold">Back to login</a>
            </p>
        </form>
    </ng-container>

</div>
