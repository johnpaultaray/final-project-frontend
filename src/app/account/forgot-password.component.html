<div class="account-glass">

    <p class="card-subtitle">Enter your email and we'll send you reset instructions</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-4">
            <label class="form-label">Email Address</label>
            <input type="text" formControlName="email" class="form-control"
                [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" placeholder="you@example.com" />
            <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                <div *ngIf="f['email'].errors['required']">Email is required</div>
                <div *ngIf="f['email'].errors['email']">Email is invalid</div>
            </div>
        </div>

        <div class="d-flex flex-column gap-3 mb-4">
            <button [disabled]="loading" class="btn btn-primary btn-lg w-100 fw-semibold">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Send Reset Link
            </button>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            Remember your password?
            <a routerLink="/account/login" class="text-primary text-decoration-none fw-semibold">Back to login</a>
        </p>
    </form>
</div>
