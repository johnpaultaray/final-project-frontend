<div class="account-glass">
    <h4 class="card-title">Welcome Back</h4>
    <p class="card-subtitle">Sign in to your account to continue</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="text" formControlName="email" class="form-control"
                [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" placeholder="you@example.com" />
            <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                <div *ngIf="f['email'].errors['required']">Email is required</div>
                <div *ngIf="f['email'].errors['email']">Email is invalid</div>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control"
                [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" placeholder="••••••••" />
            <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                <div *ngIf="f['password'].errors['required']">Password is required</div>
            </div>
        </div>

        <div class="d-flex flex-column gap-3 mb-4">
            <button [disabled]="loading" class="btn btn-primary btn-lg w-100 fw-semibold">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Sign In
            </button>
            <a routerLink="/account/forgot-password" class="text-center text-white"
                style="text-decoration: none; font-size: 0.875rem;">
                Forgot your password?
            </a>
        </div>

        <div class="divider"></div>

        <p class="footer-text">
            Don't have an account?
            <a routerLink="/account/register" class="text-primary text-decoration-none fw-semibold">Create one</a>
        </p>
    </form>
</div>
